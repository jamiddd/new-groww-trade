version: "3.9"

services:
  mongo:
    image: mongo:7
    restart: always
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: ${DB_NAME:-scalpx}
      # Where to persist the Groww instrument-master CSV across restarts.
      # The disk pickle lives on a docker volume so a `docker compose up
      # --build` doesn't trigger a cold 162k-row download (which used to
      # block the first request long enough to hit gunicorn's 60s timeout).
      SCALPX_CACHE_DIR: /var/scalpx-cache
    volumes:
      - scalpx_cache:/var/scalpx-cache
    expose:
      - "8001"

  caddy:
    image: caddy:2-alpine
    restart: always
    environment:
      DOMAIN: ${DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  mongo_data:
  caddy_data:
  caddy_config:
  scalpx_cache:
